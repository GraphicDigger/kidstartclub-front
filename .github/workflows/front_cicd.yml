name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy using ssh
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
            eval "$(ssh-agent -s)"
            chmod 600 ~/.ssh/github
            ssh-add ~/.ssh/github

            cd ~/kidstartclub-front

            git reset --hard HEAD
            git pull git@github.com:GraphicDigger/kidstartclub-front.git main

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            nvm use 20
            rm -rf .next

            npm ci

            npm run build

            pm2 restart kidstartclub --update-env || PORT=3002 pm2 start "npm run start" --name kidstartclub
            pm2 save
