      - generic [ref=e128]:
        - heading "Краткое содержание «Любовь к жизни»" [level=2] [ref=e129]
        - paragraph [ref=e130]: "Герой остаётся один в суровой северной природе после того, как его бросает товарищ. У него нет еды, почти нет сил и нет уверенности, что он доберётся до людей. Вся история строится вокруг его движения вперёд: шаг за шагом, несмотря на боль, страх и истощение."
        - paragraph [ref=e131]: Это не приключение в привычном смысле, а последовательность решений, от которых зависит жизнь.
        - heading "Чему учит рассказ «Любовь к жизни»" [level=2] [ref=e132]
        - paragraph [ref=e133]: В анализе рассказа «Любовь к жизни» важно не только то, что происходит, но и как герой действует.
        - heading "Решения имеют последствия" [level=3] [ref=e134]
        - paragraph [ref=e135]: Каждое действие влияет на шанс выжить. Ошибки нельзя отложить или исправить позже.
        - heading "Мир не обязан быть справедливым" [level=3] [ref=e136]
        - paragraph [ref=e137]: Природа не подстраивается под человека. Это формирует более реалистичное восприятие жизни.
        - heading "Воля — это не мотивация" [level=3] [ref=e138]
        - paragraph [ref=e139]: Герой продолжает двигаться, даже когда нет сил и желания. Это показывает, как работает поведение в экстремальных условиях.
        - heading "Человек — это не только разум" [level=3] [ref=e140]
        - paragraph [ref=e141]: Инстинкты, страх и физическое состояние напрямую влияют на решения.
        - heading "Почему эта книга важна для подростков" [level=2] [ref=e142]
        - paragraph [ref=e143]: Рассказ Джека Лондона помогает подростку увидеть связь между выбором и результатом. В безопасной форме через чтение он проживает ситуацию, где каждое действие имеет значение.
        - paragraph [ref=e144]: "Такие книги для подростков развивают:"
        - list [ref=e145]:
          - listitem [ref=e146]: способность анализировать ситуации
          - listitem [ref=e147]: понимание последствий решений
          - listitem [ref=e148]: умение выдерживать неопределённость
          - listitem [ref=e149]: более точное представление о себе и своих границах
        - heading "Какие выводы подросток может взять из книги" [level=2] [ref=e150]
        - paragraph [ref=e151]: "Смысл рассказа «Любовь к жизни» повествуется через опыт героя: человек может продолжать действовать даже в условиях, где нет гарантий результата. Это не история про победу, а про процесс — как принимаются решения, когда нет правильного ответа."
        - heading "Почему важно обсуждать эту книгу" [level=2] [ref=e152]
        - paragraph [ref=e153]: После чтения у разных людей появляются разные интерпретации поведения героя. Обсуждение помогает увидеть альтернативные точки зрения и точнее сформулировать собственные выводы.
        - paragraph [ref=e154]: "Именно в этом формате книга даёт максимальную пользу: не только как история, но и как инструмент развития мышления."
